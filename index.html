<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adieu - EEE 2k26</title>
    <!-- We use Tailwind CSS via CDN for the beautiful styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth fade-in animation for when the page loads */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 1.5s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-200 font-sans overflow-x-hidden selection:bg-amber-500 selection:text-slate-900">

    <!-- Dynamic Background Elements (Glowing Orbs) -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-20%] w-96 h-96 bg-amber-600/10 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-20%] w-96 h-96 bg-blue-600/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="relative z-10 flex flex-col items-center w-full max-w-md mx-auto">
        
        <!-- Hero Section -->
        <header class="w-full min-h-[85vh] flex flex-col items-center justify-center px-6 text-center animate-fade-in">
            <div class="w-16 h-1 bg-amber-500 mb-8 rounded-full"></div>
            <h1 class="text-5xl font-extrabold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-br from-amber-200 to-amber-600 drop-shadow-sm">
                Adieu.
            </h1>
            <h2 class="text-xl text-slate-400 font-light mb-8 tracking-widest uppercase">
                The Legacy of EEE
            </h2>
            <p class="text-slate-300 leading-relaxed font-light mb-12">
                Marking the end of an era, the late-night circuits, and the unbreakable bonds. Here is to the journeys completed and the chapters yet to be written.
            </p>
            
            <!-- Scroll Indicator -->
            <div class="animate-bounce mt-8 opacity-50">
                <svg class="w-6 h-6 text-amber-500" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                </svg>
            </div>
        </header>

        <!-- Highlight Video Section -->
        <section class="w-full px-4 py-12 flex flex-col items-center">
            <h3 class="text-xs font-bold tracking-[0.2em] text-amber-500 uppercase mb-8">
                The Highlight Reel
            </h3>
            
            <div class="w-full relative group rounded-xl p-1 bg-gradient-to-b from-slate-800 to-slate-900 shadow-2xl shadow-amber-900/20">
                <div class="absolute inset-0 bg-amber-500/20 blur-xl rounded-full opacity-50 transition-opacity duration-500"></div>
                <div class="relative w-full aspect-[9/16] md:aspect-video bg-black rounded-lg overflow-hidden border border-slate-700/50">
                    <video 
                        controls 
                        controlsList="nodownload"
                        class="w-full h-full object-cover"
                        poster="https://github.com/nkub4654/farewell-EEE-2k26/blob/main/Images/photo0.jpg?raw=true"
                    >
                        <!-- Using your provided MKV link -->
                        <source src="https://github.com/nkub4654/farewell-EEE-2k26/raw/refs/heads/main/videos/video01.mkv" type="video/webm" />
                        <source src="https://github.com/nkub4654/farewell-EEE-2k26/raw/refs/heads/main/videos/video01.mkv" type="video/mp4" />
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </section>

        <!-- Scattered Memories Section (Non-Grid) -->
        <section class="w-full px-4 py-20 flex flex-col items-center overflow-hidden">
            <h3 class="text-xs font-bold tracking-[0.2em] text-amber-500 uppercase mb-16">
                Captured Fragments
            </h3>

            <!-- JavaScript will inject the photos into this container -->
            <div id="scrapbook-container" class="w-full flex flex-col pb-20 relative"></div>
        </section>

        <!-- Footer -->
        <footer class="w-full py-16 px-6 text-center border-t border-slate-800/50">
            <h4 class="text-2xl font-serif italic text-amber-400 mb-4">
                Until our paths cross again.
            </h4>
            <p class="text-xs text-slate-500 tracking-widest uppercase">
                Class of 2026 • Electrical & Electronics
            </p>
        </footer>

    </div>

    <!-- Script to automatically generate the scattered photos -->
    <script>
        const container = document.getElementById('scrapbook-container');
        
        // Change this number to however many photos you have in your GitHub repo!
        const totalPhotos = 9; 

        for(let i = 1; i <= totalPhotos; i++) {
            // Create organic, random scattering effects
            const rotation = (Math.random() * 12 - 6).toFixed(1); // Random rotation between -6 and 6 degrees
            const align = i % 2 === 0 ? 'flex-end' : 'flex-start'; // Zig-zag alignment
            const marginX = Math.random() * 15 + 10; // Random side margin
            const marginTop = i === 1 ? '10px' : '-60px'; // Negative margin creates the overlapping stack effect
            const zIndex = i; // Ensure photos stack correctly

            // Create the polaroid wrapper
            const photoDiv = document.createElement('div');
            photoDiv.className = "relative bg-slate-100 p-2 pb-10 rounded-sm shadow-2xl border border-slate-300 transition-transform duration-300 active:scale-105";
            photoDiv.style.cssText = `
                width: 75%;
                max-width: 280px;
                align-self: ${align};
                margin-${align === 'flex-start' ? 'left' : 'right'}: ${marginX}px;
                margin-top: ${marginTop};
                transform: rotate(${rotation}deg);
                z-index: ${zIndex};
            `;

            // Insert the image and the little "tape" at the top
            photoDiv.innerHTML = `
                <div class="w-full aspect-square bg-slate-200 overflow-hidden relative">
                    <img 
                        src="https://github.com/nkub4654/farewell-EEE-2k26/blob/main/Images/photo${i}.jpg?raw=true" 
                        alt="Memory ${i}" 
                        class="w-full h-full object-cover"
                        loading="lazy"
                        onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-slate-500 text-sm font-semibold\\'>Awaiting Image ${i}</div>';"
                    />
                </div>
                <!-- Semi-transparent piece of tape -->
                <div class="absolute top-[-8px] left-1/2 transform -translate-x-1/2 w-16 h-4 bg-white/40 backdrop-blur-md rotate-2 shadow-sm"></div>
            `;

            container.appendChild(photoDiv);
        }
    </script>
</body>
</html>
